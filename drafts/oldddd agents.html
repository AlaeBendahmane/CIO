  <script>
    const SELECTOR_SIDEBAR_WRAPPER = '.sidebar-wrapper';
    const Default = {
      scrollbarTheme: 'os-theme-light',
      scrollbarAutoHide: 'leave',
      scrollbarClickScroll: true,
    };

    document.addEventListener('DOMContentLoaded', function() {
      fetch('../api/get_agents.php')
        .then(res => res.json())
        .then(data => {
          if (data.status === 'success') {
            const tbody = document.querySelector('#agentsTable tbody');
            tbody.innerHTML = '';

            data.data.forEach((agent, index) => {
              const row = `
            <tr class="align-middle">
              <td>${agent?.idFiscal}</td>
              <td>${agent?.idProx}</td>
              <td>${agent?.ste}</td>
              <td>${agent?.campagne}</td>
              <td>${agent?.nom}</td>
              <td>${agent?.prenom}</td>
              <td>${agent?.email}</td>
              <td>${agent?.role}</td>
              <td>
                <button class="btn btn-sm btn-primary me-1" title="Edit" onclick="editAgent(${agent?.idFiscals})">
                  <i class="bi bi-pencil"></i>
                </button>
                <button class="btn btn-sm btn-danger" title="Update" onclick="updateAgent(${agent?.idFiscals})">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>
        `;

              tbody.insertAdjacentHTML('beforeend', row);
            });
          } else {
            console.error('Error fetching agents:', data.message);
          }
        })
        .catch(err => console.error('Fetch error:', err));

      //////
      const sidebarWrapper = document.querySelector(SELECTOR_SIDEBAR_WRAPPER);
      const body = document.body;

      function handleSidebar() {
        const width = window.innerWidth;

        if (width < 992) {
          body.classList.add('sidebar-collapse');
          body.classList.remove('sidebar-open');
        } else {
          body.classList.remove('sidebar-collapse');
        }
      }

      handleSidebar();

      window.addEventListener('resize', handleSidebar);

      const isMobile = window.innerWidth <= 992;

      if (
        sidebarWrapper &&
        OverlayScrollbarsGlobal?.OverlayScrollbars !== undefined &&
        !isMobile
      ) {
        OverlayScrollbarsGlobal.OverlayScrollbars(sidebarWrapper, {
          scrollbars: {
            theme: Default.scrollbarTheme,
            autoHide: Default.scrollbarAutoHide,
            clickScroll: Default.scrollbarClickScroll,
          },
        });
      }
    });
    ///
  </script>
